<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargoTracker 云端控制台</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0a0d14; --card: #131620; --border: #1e2230;
  --text: #9aa0b4; --head: #e0e4f0; --accent: #4da6ff;
  --dim: #66708a;
  --good: #34d399; --warn: #f59e0b; --bad: #ef4444;
  --gauge-bg: #1a1e2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 0;
}
/* header */
.header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.header h1 { font-size: 1rem; color: var(--head); font-weight: 600; }
.status { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.online { background: var(--good); box-shadow: 0 0 6px var(--good); }
.dot.offline{ background: var(--bad); }
/* main grid */
.main { display: grid; gap: 12px; padding: 12px; max-width: 480px; margin: 0 auto; }
/* cards */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.card h2 { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
/* gauges */
.gauges { display: flex; gap: 12px; }
.gauge {
  flex: 1; text-align: center; padding: 12px 8px;
  background: var(--gauge-bg); border-radius: 8px;
}
.gauge .val {
  font-size: 2rem; font-weight: 700; color: var(--head);
  font-variant-numeric: tabular-nums;
}
.gauge .unit { font-size: 0.85rem; color: var(--accent); margin-left: 2px; }
.gauge .label { font-size: 0.7rem; color: var(--dim); margin-top: 4px; }
/* gps */
.gps-row { display: flex; gap: 16px; }
.gps-item { flex: 1; }
.gps-item .label { font-size: 0.7rem; color: var(--dim); }
.gps-item .val { font-size: 1.1rem; color: var(--head); font-family: monospace; }
/* buttons */
.cmds { display: flex; gap: 8px; }
.cmd-btn {
  flex: 1; padding: 12px 0; border: none; border-radius: 8px;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  color: #fff; transition: opacity 0.15s;
}
.cmd-btn:active { opacity: 0.7; }
.cmd-hold   { background: #3b82f6; }
.cmd-return { background: #f59e0b; }
.cmd-continue { background: #10b981; }
/* log */
.log { max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.72rem; line-height: 1.6; }
.log .ts { color: var(--dim); margin-right: 8px; }
.log .val-temp { color: #f87171; }
.log .val-hum  { color: #60a5fa; }
.log .val-cmd  { color: #fbbf24; }
/* battery bar */
.bar-wrap { height: 8px; background: var(--gauge-bg); border-radius: 4px; margin-top: 8px; }
.bar-inner { height: 100%; border-radius: 4px; background: var(--good); transition: width 0.3s; }
/* map */
#map-container {
  width: 100%; height: 260px; border-radius: 8px; overflow: hidden;
  background: var(--gauge-bg);
  border: 1px solid rgba(154, 160, 180, 0.18);
}
.map-info {
  display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 8px; font-size: 0.78rem;
}
.map-info .item { display: flex; gap: 4px; }
.map-info .label { color: var(--dim); }
.map-info .val { color: var(--head); font-family: monospace; }
/* Leaflet 暗色覆盖 */
.leaflet-container { background: var(--gauge-bg); }
.leaflet-container img { max-width: none !important; max-height: none !important; }
.leaflet-tile {
  filter: brightness(0.55) contrast(1.15) saturate(0.55) invert(1) hue-rotate(180deg);
}
.leaflet-control-zoom a {
  background: var(--card); color: var(--head); border-color: var(--border);
}
.leaflet-control-attribution {
  background: var(--card) !important; color: var(--dim) !important; font-size: 0.6rem !important;
}
.leaflet-control-attribution a { color: var(--accent) !important; }
</style>
</head>
<body>

<div class="header">
  <h1>CargoTracker 云端控制台</h1>
  <div class="status">
    <span class="dot offline" id="dot"></span>
    <span id="status-text">离线</span>
  </div>
</div>

<div class="main">
  <!-- 温湿度 -->
  <div class="card">
    <h2>实时环境</h2>
    <div class="gauges">
      <div class="gauge">
        <div class="val" id="temp-val">--</div>
        <div class="label"><span class="unit">&deg;C</span> 温度</div>
      </div>
      <div class="gauge">
        <div class="val" id="hum-val">--</div>
        <div class="label"><span class="unit">%</span> 湿度</div>
      </div>
    </div>
  </div>

  <!-- GPS 地图 -->
  <div class="card">
    <h2>GPS 定位</h2>
    <div class="map-info">
      <div class="item"><span class="label">纬度</span><span class="val" id="lat-val">--</span></div>
      <div class="item"><span class="label">经度</span><span class="val" id="lon-val">--</span></div>
      <div class="item"><span class="label">定位</span><span class="val" id="gps-v">--</span></div>
    </div>
    <div id="map-container"></div>
  </div>

  <!-- 信号 + 最后上报 -->
  <div class="card">
    <h2>连接状态</h2>
    <div style="display:flex;gap:16px;align-items:center">
      <div style="flex:1">
        <div style="font-size:0.7rem;color:var(--dim)">4G 信号</div>
        <div style="font-size:1.5rem;color:var(--head);font-weight:700" id="csq-val">--</div>
      </div>
      <div style="flex:1">
        <div style="font-size:0.7rem;color:var(--dim)">最后上报</div>
        <div style="font-size:1.1rem;color:var(--head)" id="last-seen">--</div>
      </div>
    </div>
  </div>

  <!-- 指令 -->
  <div class="card">
    <h2>云端指令</h2>
    <div class="cmds">
      <button class="cmd-btn cmd-hold" onclick="sendCmd('HOLD')">暂留</button>
      <button class="cmd-btn cmd-return" onclick="sendCmd('RETURN')">退货</button>
      <button class="cmd-btn cmd-continue" onclick="sendCmd('CONTINUE')">继续运输</button>
    </div>
  </div>

  <!-- 日志 -->
  <div class="card">
    <h2>数据日志</h2>
    <div class="log" id="log"><div style="color:var(--dim)">等待设备上报...</div></div>
  </div>
</div>

<script>
const BROKER = 'broker.emqx.io';
const PORT = 8084;
const PATH = '/mqtt';
const TOPIC_TELEM = 'cargo/telemetry';
const TOPIC_CMD   = 'cargo/cmd';

const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const logEl = document.getElementById('log');

let firstMsg = true;
let lastTs = 0;
setInterval(() => {
  if (lastTs > 0) {
    const sec = Math.floor((Date.now() - lastTs) / 1000);
    const min = Math.floor(sec / 60);
    document.getElementById('last-seen').textContent = sec < 60 ? sec + 's 前' : min + 'm' + (sec % 60) + 's 前';
  }
}, 2000);

/* ---------- Leaflet 地图 ---------- */
/* 华东范围：江浙沪 + 周边缓冲区 */
const EAST_CHINA_BOUNDS = [[27.0, 116.0], [35.5, 123.0]];

const map = L.map('map-container', {
  attributionControl: false,
  zoomControl: true,
  preferCanvas: true,
  fadeAnimation: false,       // 关闭瓦片淡入，消除色块闪烁
  maxBounds: EAST_CHINA_BOUNDS,
  maxBoundsViscosity: 0.8,    // 拖出边界时有阻力但不硬卡
  minZoom: 7,
}).setView([31.2, 120.5], 9); // 默认视野：长三角居中

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  updateWhenIdle: false,      // 拖动/缩放时立即加载，不等空闲
  keepBuffer: 3,
  crossOrigin: true,
}).addTo(map);

let deviceMarker = null;
let firstFix = true;

function refreshMapSize() {
  requestAnimationFrame(() => {
    map.invalidateSize({ pan: false });
    setTimeout(() => map.invalidateSize({ pan: false }), 200);
  });
}

window.addEventListener('load', refreshMapSize);
window.addEventListener('resize', refreshMapSize);
refreshMapSize();

function updateMap(lat, lon, valid) {
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
    return;
  }

  if (!valid) {
    if (deviceMarker) deviceMarker.setStyle({ fillColor: '#6b7280', color: '#6b7280' });
    return;
  }

  refreshMapSize();
  const pos = [lat, lon];

  if (!deviceMarker) {
    deviceMarker = L.circleMarker(pos, {
      radius: 8,
      fillColor: '#4da6ff',
      color: '#fff',
      weight: 2,
      fillOpacity: 0.9,
    }).addTo(map);
    deviceMarker.bindTooltip('设备位置', { offset: [0, -12] });
  } else {
    deviceMarker.setLatLng(pos);
    deviceMarker.setStyle({ fillColor: '#4da6ff', color: '#fff' });
  }

  if (firstFix) {
    map.setView(pos, 15, { animate: true });
    firstFix = false;
  } else {
    map.panTo(pos, { animate: true, duration: 0.4 });
  }
}

const client = mqtt.connect(`wss://${BROKER}:${PORT}${PATH}`, {
  clientId: 'dashboard_' + Math.random().toString(16).slice(2, 8),
  clean: true,
  reconnectPeriod: 3000,       // 断线后 3s 开始重连
  connectTimeout: 10000,       // 10s 连接超时
});

let reconnectAttempts = 0;

client.on('connect', () => {
  reconnectAttempts = 0;
  dot.className = 'dot online';
  statusText.textContent = '已连接';
  client.subscribe(TOPIC_TELEM);
  addLog('system', '已连接 broker.emqx.io');
});

client.on('reconnect', () => {
  reconnectAttempts++;
  dot.className = 'dot offline';
  statusText.textContent = `重连中(${reconnectAttempts})…`;
});

client.on('close', () => {
  dot.className = 'dot offline';
  statusText.textContent = '已断开，等待重连…';
});

client.on('error', (err) => {
  console.error('MQTT error:', err);
  addLog('system', '连接错误: ' + (err.message || err));
});

client.on('message', (topic, payload) => {
  try {
    const data = JSON.parse(payload.toString());
    updateUI(data);
    addLog('data', JSON.stringify(data));
  } catch(e) {
    addLog('raw', payload.toString());
  }
});

function updateUI(d) {
  const temp = Number(d.temp);
  const hum = Number(d.hum);
  const lat = Number(d.lat);
  const lon = Number(d.lon);

  if (d.temp !== undefined) {
    document.getElementById('temp-val').textContent = Number.isFinite(temp) ? temp.toFixed(1) : '--';
  }
  if (d.hum !== undefined) {
    document.getElementById('hum-val').textContent = Number.isFinite(hum) ? hum.toFixed(1) : '--';
  }
  if (d.lat !== undefined) {
    document.getElementById('lat-val').textContent = Number.isFinite(lat) ? lat.toFixed(4) : '--';
  }
  if (d.lon !== undefined) {
    document.getElementById('lon-val').textContent = Number.isFinite(lon) ? lon.toFixed(4) : '--';
  }
  const gpsValid = d.gps_v !== undefined ? d.gps_v : d.gps_valid;
  if (gpsValid !== undefined) {
    const el = document.getElementById('gps-v');
    const ok = gpsValid === true || Number(gpsValid) === 1;
    el.textContent = ok ? 'Yes' : 'No';
    el.style.color = ok ? 'var(--good)' : 'var(--bad)';
  }
  /* 更新地图 */
  if (d.lat !== undefined && d.lon !== undefined) {
    const valid = (d.gps_v !== undefined ? d.gps_v : d.gps_valid);
    const hasValidityFlag = valid !== undefined && valid !== null;
    updateMap(lat, lon, hasValidityFlag ? (valid === true || Number(valid) === 1) : true);
  }
  if (d.csq !== undefined) {
    const csq = d.csq;
    const el = document.getElementById('csq-val');
    el.textContent = csq;
    el.style.color = csq >= 20 ? 'var(--good)' : csq >= 10 ? 'var(--warn)' : 'var(--bad)';
  }
  lastTs = Date.now();
  document.getElementById('last-seen').textContent = '刚刚';
}

function sendCmd(cmd) {
  client.publish(TOPIC_CMD, JSON.stringify({ cmd: cmd, ts: Math.floor(Date.now()/1000) }));
  addLog('cmd', '下发指令: ' + cmd);
}

function addLog(type, msg) {
  if (firstMsg) { logEl.innerHTML = ''; firstMsg = false; }
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);
  let cls = '';
  if (type === 'cmd') cls = 'val-cmd';
  const div = document.createElement('div');
  div.innerHTML = `<span class="ts">${ts}</span><span class="${cls}">${msg}</span>`;
  logEl.prepend(div);
  if (logEl.children.length > 20) logEl.removeChild(logEl.lastChild);
}
</script>
</body>
</html>
